services:
  timescaledb:
    image: timescale/timescaledb:2.25.0-pg17
    container_name: infoclimat-timescaledb
    environment:
      POSTGRES_USER: infoclimat
      POSTGRES_PASSWORD: infoclimat2026
      POSTGRES_DB: meteodb
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infoclimat -d meteodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-seed:
    build:
      context: ..
      dockerfile: dev_scripts/Dockerfile.db-seed
    depends_on:
      - timescaledb
    working_dir: /workspace/backend
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
    volumes:
      - ..:/workspace/backend
    profiles:
      - tools
    entrypoint: [ "bash", "dev_scripts/seed_dev.sh" ]

volumes:
  timescaledb-data:
    driver: local
